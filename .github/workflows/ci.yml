name: CI Pipeline

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x] # Vite/React requires a modern Node version

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      # Cross-platform issue fix: Windows package-lock.json might not contain Linux-specific optional binaries (like @emnapi)
      # Using npm install instead of npm ci allows Ubuntu to resolve its own platform-specific dependencies.
      run: npm install --no-fund --no-audit

    - name: Run Linter
      run: npm run lint

    - name: Run Type Check and Build
      run: npm run build

    - name: Run Tests
      run: npm run test
